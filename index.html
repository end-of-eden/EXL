<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>END OF EDEN</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  opacity: 1;
  transition: opacity 0.4s ease;
}

.main-card {
  width: 960px;
  height: 580px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
  cursor: pointer;
  position: relative;
  transition: transform 0.2s, box-shadow 0.2s;
}

.main-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.13), 0 4px 12px rgba(0,0,0,0.08);
}

body.fade-out {
  opacity: 0;
  transition: opacity 0.4s ease;
}

.main-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
  display: block;
}

.main-card-overlay {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem;
  transition: background 0.4s ease;
}

.main-card-overlay p {
  font-family: 'Pretendard', sans-serif;
  font-size: 15px;
  font-weight: 300;
  line-height: 2.2;
  color: rgba(135,206,235,0);
  text-align: center;
  letter-spacing: 0.03em;
  transition: color 0.4s ease 0.1s;
  word-break: keep-all;
}

.main-card:hover .main-card-overlay {
  background: rgba(20,20,30,0.65);
}

.main-card:hover .main-card-overlay p {
  color: rgba(135,206,235,0.9);
}
</style>
</head>
<body>

<div class="main-card" onclick="fadeOut()">
  <img src="https://raw.githubusercontent.com/end-of-eden/EXL/main/main.png" alt="END OF EDEN">
  <div class="main-card-overlay">
    <p>과거의 영광을, 현재의 상흔을,<br>그리고 앞으로 우리가 함께 만들어갈 미래의 약속을.</p>
  </div>
</div>

<script>
function fadeOut() {
  document.body.style.opacity = '0';
  setTimeout(function() { location.href = 'wiki.html'; }, 400);
}
window.addEventListener('pageshow', function(e) {
  document.body.style.opacity = '1';
});
</script>
<script src="sparkle.js"></script>
</body>
</html>
