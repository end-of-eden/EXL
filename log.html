<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>END OF EDEN — Log</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-border-tertiary: rgba(160,190,220,0.20);
  --color-border-secondary: rgba(140,175,210,0.30);
  --color-text-primary: #2a2a35;
  --color-text-secondary: #6b7280;
  --color-text-tertiary: #a8b4c0;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  font-family: var(--font-sans);
  background: #ffffff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
}

.topnav {
  width: 100%;
  max-width: 960px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 2px;
  margin-bottom: 10px;
}
.topnav a {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  text-decoration: none;
  padding: 5px 14px;
  border-radius: var(--border-radius-md);
  transition: background 0.15s, color 0.15s;
}
.topnav a:hover { background: #f3f4f6; color: var(--color-text-secondary); }
.topnav a.active { background: #f3f4f6; color: var(--color-text-primary); }
.topnav-divider { width: 1px; height: 12px; background: var(--color-border-tertiary); margin: 0 4px; }

.log-wrap {
  width: 100%;
  max-width: 960px;
  height: 580px;
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  overflow: hidden;
  background: #ffffff;
  box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
}

.log-scroll {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 1.75rem;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
}
.log-scroll.dragging { cursor: grabbing; }
.log-scroll::-webkit-scrollbar { width: 3px; }
.log-scroll::-webkit-scrollbar-track { background: transparent; }
.log-scroll::-webkit-scrollbar-thumb { background: var(--color-border-secondary); border-radius: 99px; }

.log-item {
  display: flex;
  gap: 1.25rem;
  align-items: flex-start;
  padding: 1.25rem 0;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  cursor: pointer;
  transition: opacity 0.15s;
}
.log-item:first-child { padding-top: 0; }
.log-item:last-child { border-bottom: none; }
.log-item:hover { opacity: 0.75; }

.log-item-text { flex: 1; min-width: 0; }
.log-item-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--color-text-primary);
  margin-bottom: 4px;
}
.log-item-date {
  font-size: 11px;
  color: var(--color-text-tertiary);
  margin-bottom: 8px;
}
.log-item-preview {
  font-size: 13px;
  line-height: 1.7;
  color: var(--color-text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.log-item-thumb {
  width: 100px;
  height: 100px;
  border-radius: var(--border-radius-md);
  object-fit: cover;
  flex-shrink: 0;
  border: 0.5px solid var(--color-border-tertiary);
}
</style>
</head>
<body>

<nav class="topnav">
  <a href="wiki.html">Wiki</a>
  <div class="topnav-divider"></div>
  <a href="gallery.html">Gallery</a>
  <div class="topnav-divider"></div>
  <a href="log.html" class="active">Log</a>
</nav>

<div class="log-wrap">
  <div class="log-scroll" id="log-scroll">
    <div id="log-list"></div>
  </div>
</div>

<script>
// ✏️ 로그 추가할 때 여기에 한 줄씩 추가
var logs = [
  { id: '001', title: '로그 제목', date: '2026.06.26', preview: '미리보기 텍스트를 여기에 입력하세요...', thumb: 'img/log/001.jpg' },
];

var base = 'https://raw.githubusercontent.com/end-of-eden/EXL/main/';

function render() {
  var list = document.getElementById('log-list');
  list.innerHTML = logs.map(function(log) {
    return '<div class="log-item" onclick="location.href=\'Log/' + log.id + '.html\'">' +
      '<div class="log-item-text">' +
      '<div class="log-item-title">' + log.title + '</div>' +
      '<div class="log-item-date">' + log.date + '</div>' +
      '<div class="log-item-preview">' + log.preview + '</div>' +
      '</div>' +
      '<img class="log-item-thumb" src="' + base + log.thumb + '" alt="' + log.title + '" loading="lazy">' +
      '</div>';
  }).join('');
}

render();

var scrollEl = document.getElementById('log-scroll');
var isDown = false, startY = 0, scrollTop = 0;
scrollEl.addEventListener('mousedown', function(e) {
  isDown = true; startY = e.pageY - scrollEl.offsetTop; scrollTop = scrollEl.scrollTop;
  scrollEl.classList.add('dragging');
});
document.addEventListener('mouseup', function() { isDown = false; scrollEl.classList.remove('dragging'); });
scrollEl.addEventListener('mousemove', function(e) {
  if (!isDown) return;
  e.preventDefault();
  scrollEl.scrollTop = scrollTop - (e.pageY - scrollEl.offsetTop - startY);
});
</script>

<script src="sparkle.js"></script>
</body>
</html>
